<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MLX Studio{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/main.css') }}">
    <!-- HTMX -->
    <script src="{{ url_for('static', path='/js/htmx.min.js') }}" defer></script>
    <!-- HTMX SSE extension (for streaming chat/workspace) -->
    <script src="{{ url_for('static', path='/js/htmx-sse.js') }}" defer></script>
    <!-- Prism.js syntax highlighting -->
    <link rel="stylesheet" href="{{ url_for('static', path='/css/prism-dark.min.css') }}">
    <script src="{{ url_for('static', path='/js/prism.min.js') }}" data-manual defer></script>
    <script src="{{ url_for('static', path='/js/prism-python.min.js') }}" defer></script>
    <!-- Shared chat-content renderer: parses <think>/<tool>/<tool_result>
         sentinels into styled HTML. Used by Chat and RAG (workspace tab
         uses its own inline renderer). -->
    <script src="{{ url_for('static', path='/js/chat-render.js') }}" defer></script>
    <script>
        // Re-highlight code blocks whenever HTMX swaps in new content
        document.addEventListener("htmx:afterSwap", function(evt) {
            if (typeof Prism !== "undefined") {
                Prism.highlightAllUnder(evt.detail.target);
            }
        });
    </script>
</head>
<body>
    <nav class="nav">
        <a href="/" class="nav-brand">MLX Studio</a>
        <div class="nav-links">
            <a href="/image">Image</a>
            <a href="/chat">Chat</a>
            <a href="/workspace">Workspace</a>
            <a href="/rag">RAG</a>
            <a href="/skills">Skills</a>
            <a href="/finetune">Fine-tune</a>
            <a href="/settings">Settings</a>
        </div>
        <div class="server-status">
            <span
                id="image-server-status"
                hx-get="/status/image"
                hx-trigger="load, every 5s"
                hx-swap="outerHTML"
            >⏳ image</span>
            <span
                id="text-server-status"
                hx-get="/status/text"
                hx-trigger="load, every 5s"
                hx-swap="outerHTML"
            >⏳ text</span>
        </div>
    </nav>
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
