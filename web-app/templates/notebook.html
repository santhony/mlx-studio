{% extends "base.html" %}
{% block title %}{{ notebook.name }} — Notebook — Qwen Studio{% endblock %}
{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
    <h1>{{ notebook.name }}</h1>
    <button
        hx-post="/notebook/{{ notebook.id }}/cells"
        hx-target="#cells"
        hx-swap="beforeend"
        class="secondary"
    >+ Add Cell</button>
</div>

<div id="cells">
    {% for cell in cells %}
    {% include "cell.html" %}
    {% else %}
    <p style="color: var(--text-muted); text-align: center; padding: 2rem;">
        No cells yet. Click "+ Add Cell" to get started.
    </p>
    {% endfor %}
</div>

<style>
.cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 1rem;
    overflow: hidden;
}

.cell-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.5rem 1rem;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.2);
}

.cell-body { padding: 1rem; }

.cell-prompt textarea {
    font-family: var(--mono);
    font-size: 0.9rem;
    min-height: 60px;
    background: var(--bg);
}

.cell-code-block {
    margin-top: 0.75rem;
    background: var(--bg);
    border-radius: var(--radius);
    overflow: auto;
    max-height: 400px;
}

.cell-code-block pre {
    margin: 0;
    padding: 0.75rem 1rem;
    font-size: 0.85rem;
    line-height: 1.5;
}

.cell-output {
    margin-top: 0.5rem;
    background: #0a0a0a;
    border-radius: var(--radius);
    padding: 0.75rem 1rem;
    font-family: var(--mono);
    font-size: 0.85rem;
    white-space: pre-wrap;
    max-height: 300px;
    overflow-y: auto;
}

.cell-output pre { margin: 0; font-family: inherit; }
.cell-output-error { color: var(--red); }
.cell-output-empty { color: var(--text-muted); }

.saved-indicator {
    color: var(--green);
    font-size: 0.8rem;
    animation: fadeout 2s forwards;
}
@keyframes fadeout { 0% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; } }
</style>
{% endblock %}
