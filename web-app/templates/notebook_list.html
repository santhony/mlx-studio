{% extends "base.html" %}
{% block title %}Notebook — Qwen Studio{% endblock %}
{% block content %}
<h1>Notebooks</h1>

<div class="card">
    <form method="post" action="/notebook/" style="display: flex; gap: 0.75rem; align-items: flex-end;">
        <div class="form-group" style="flex: 1">
            <label for="name">Notebook name (optional)</label>
            <input type="text" id="name" name="name" placeholder="Untitled Notebook">
        </div>
        <button type="submit">New Notebook</button>
    </form>
</div>

{% if notebooks %}
<div>
    {% for nb in notebooks %}
    <div class="card" style="display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.5rem; margin-bottom: 0.5rem;">
        <a href="/notebook/{{ nb.id }}" style="color: var(--text); text-decoration: none; flex: 1;">
            <strong>{{ nb.name }}</strong>
            <span style="color: var(--text-muted); font-size: 0.8rem; margin-left: 1rem;">{{ nb.updated_at }}</span>
        </a>
    </div>
    {% endfor %}
</div>
{% else %}
<p style="color: var(--text-muted)">No notebooks yet. Create one above.</p>
{% endif %}
{% endblock %}
