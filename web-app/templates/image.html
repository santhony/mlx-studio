{% extends "base.html" %}
{% block title %}Image Generation — Qwen Studio{% endblock %}
{% block content %}
<h1>Image Generation</h1>

<div class="card">
    <form
        hx-post="/image/generate"
        hx-target="#gallery"
        hx-swap="afterbegin"
        hx-indicator="#gen-spinner"
    >
        <div class="form-row">
            <div class="form-group" style="flex: 3">
                <label for="prompt">Prompt</label>
                <input
                    type="text"
                    id="prompt"
                    name="prompt"
                    placeholder="A photorealistic landscape..."
                    required
                    autocomplete="off"
                >
            </div>
            <div class="form-group" style="flex: 0 0 90px">
                <label for="width">Width</label>
                <input type="number" id="width" name="width" value="768" min="64" max="1024" step="64">
            </div>
            <div class="form-group" style="flex: 0 0 90px">
                <label for="height">Height</label>
                <input type="number" id="height" name="height" value="768" min="64" max="1024" step="64">
            </div>
            <button type="submit">
                Generate
                <span id="gen-spinner" class="htmx-indicator spinner"></span>
            </button>
        </div>
    </form>
</div>

<h2>Gallery</h2>
<div id="gallery" class="gallery">
    {% for img in images %}
    <div class="gallery-item">
        <img src="/image/file/{{ img.filename }}" alt="{{ img.prompt }}">
        <div class="caption">{{ img.prompt }}</div>
    </div>
    {% else %}
    <p style="color: var(--text-muted)">No images yet. Generate one above.</p>
    {% endfor %}
</div>
{% endblock %}
